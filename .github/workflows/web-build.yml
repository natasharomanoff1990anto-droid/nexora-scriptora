name: Web Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Typecheck + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        env:
          # Public Vite vars — set as GitHub Variables (Settings → Variables).
          # Missing values fall back to "coming soon" mode automatically.
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ vars.VITE_SUPABASE_PROJECT_ID }}
          VITE_AI_PROVIDER: ${{ vars.VITE_AI_PROVIDER }}
          VITE_ENABLE_GEMINI: ${{ vars.VITE_ENABLE_GEMINI }}
          VITE_ENABLE_PAYMENTS: ${{ vars.VITE_ENABLE_PAYMENTS }}
          VITE_PAYMENT_MODE: ${{ vars.VITE_PAYMENT_MODE }}
          VITE_PAYMENT_PROVIDER: ${{ vars.VITE_PAYMENT_PROVIDER }}
          VITE_PAYMENT_MONTHLY_URL: ${{ vars.VITE_PAYMENT_MONTHLY_URL }}
          VITE_PAYMENT_YEARLY_URL: ${{ vars.VITE_PAYMENT_YEARLY_URL }}
          VITE_PAYMENT_LIFETIME_URL: ${{ vars.VITE_PAYMENT_LIFETIME_URL }}
          VITE_ENABLE_DOWNLOADS: ${{ vars.VITE_ENABLE_DOWNLOADS }}
          VITE_DOWNLOAD_MODE: ${{ vars.VITE_DOWNLOAD_MODE }}
          VITE_ANDROID_APK_URL: ${{ vars.VITE_ANDROID_APK_URL }}
          VITE_ANDROID_AAB_URL: ${{ vars.VITE_ANDROID_AAB_URL }}
          VITE_MAC_DMG_URL: ${{ vars.VITE_MAC_DMG_URL }}
          VITE_MAC_ZIP_URL: ${{ vars.VITE_MAC_ZIP_URL }}
          VITE_WINDOWS_EXE_URL: ${{ vars.VITE_WINDOWS_EXE_URL }}
          VITE_APP_VERSION: ${{ vars.VITE_APP_VERSION }}
          VITE_BUILD_CHANNEL: ${{ vars.VITE_BUILD_CHANNEL }}
        run: npm run build

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: scriptora-web-${{ github.sha }}
          path: dist
          retention-days: 14